<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Share your feedback and suggestions about your stay.">
  <title>Feedback — Guest Guidebook</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- Centralized Firebase init (BUG 2 & 7) -->
  <script type="module">
    import './js/firebase.js';
  </script>
</head>
<body>
  <main class="main-content">
    <div class="container" id="pageContent"></div>
  </main>

  <script src="js/data.js"></script>
  <script src="js/ui.js"></script>
  <script>
    /**
     * Render Feedback page — submission form + existing feedback list
     * Use async functions and avoid full re-render on submit (BUG 5)
     */
    async function renderPage(property) {
      const content = document.getElementById('pageContent');
      const propertyId = property && property.id ? property.id : await GuidebookData.getActivePropertyId();
      const feedback = await GuidebookData.getFeedback(propertyId);

      let feedbackListHtml = '';
      if (feedback.length > 0) {
        feedbackListHtml = `
          <div class="card" style="animation-delay: 0.2s;">
            <div class="card-header">
              <h2>Previous Feedback</h2>
              <span class="badge badge-gold">${feedback.length}</span>
            </div>
            <div id="feedbackList">
            ${feedback.map(fb => `
              <div class="feedback-item">
                <div class="feedback-meta">
                  <span class="feedback-name">${GuidebookUI.escapeHtml(fb.name)}</span>
                  <span class="feedback-date">${GuidebookUI.formatDate(fb.date)}</span>
                </div>
                <p class="feedback-comment">${GuidebookUI.escapeHtml(fb.comment || fb.text)}</p>
              </div>
            `).join('')}
            </div>
          </div>
        `;
      } else {
        feedbackListHtml = '<div class="card"><div id="feedbackList" class="card-body"><p class="form-hint">No feedback yet.</p></div></div>';
      }

      content.innerHTML = `
        <div class="page-header">
          <div class="page-icon">💬</div>
          <h1>Guest Feedback</h1>
          <p>We'd love to hear about your experience</p>
        </div>

        <div class="card">
          <div class="card-header">
            <h2>Leave a Comment</h2>
          </div>

          <form id="feedbackForm">
            <div class="form-group">
              <label class="form-label" for="fbName">Your Name <span style="color:var(--color-text-muted)">(optional)</span></label>
              <input type="text" class="form-input" id="fbName" placeholder="Anonymous Guest" autocomplete="name">
            </div>

            <div class="form-group">
              <label class="form-label" for="fbComment">Comment / Suggestion *</label>
              <textarea class="form-textarea" id="fbComment" placeholder="Tell us about your experience..." required rows="4"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-block" id="submitFeedbackBtn">
              💬 Submit Feedback
            </button>
          </form>
        </div>

        ${feedbackListHtml}
      `;

      // Attach form handler that prepends new feedback instead of full re-render
      const form = document.getElementById('feedbackForm');
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('fbName').value.trim();
        const comment = document.getElementById('fbComment').value.trim();
        if (!comment) { GuidebookUI.showToast('Please enter a comment.', 'error'); return; }
        try {
          const propId = propertyId;
          const feedbackArr = await GuidebookData.addFeedback(propId, { name, comment });
          GuidebookUI.showToast('Thank you for your feedback!', 'success');
          // Prepend new entry to the feedback list DOM
          const newItem = feedbackArr[0];
          const list = document.getElementById('feedbackList');
          const html = `
            <div class="feedback-item">
              <div class="feedback-meta">
                <span class="feedback-name">${GuidebookUI.escapeHtml(newItem.name)}</span>
                <span class="feedback-date">${GuidebookUI.formatDate(newItem.date)}</span>
              </div>
              <p class="feedback-comment">${GuidebookUI.escapeHtml(newItem.comment || newItem.text)}</p>
            </div>
          `;
          if (list) list.insertAdjacentHTML('afterbegin', html);
          // reset form
          form.reset();
        } catch (err) {
          console.error('Failed to submit feedback', err);
          GuidebookUI.showToast('Failed to submit feedback.', 'error');
        }
      });
    }

    document.addEventListener('DOMContentLoaded', () => {
      GuidebookUI.initGuestPage(renderPage);
    });
  </script>
</body>
</html>
